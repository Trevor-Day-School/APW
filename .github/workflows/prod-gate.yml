name: Gate PRs Targeting Production
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [production]   # only runs on PRs targeting 'production'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read            # read repo to query permissions
      pull-requests: write      # close PRs
      issues: write             # comment on PRs (PRs are issues underneath)
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      ACTOR: ${{ github.actor }}
      HEAD: ${{ github.head_ref }}

    steps:
      - name: Compute policy violations
        id: check
        run: |
          FAIL_REASON=""

          # Rule 1: Source must be 'development'
          if [ "$HEAD" != "development" ]; then
            FAIL_REASON="PRs to 'production' must come from 'development'. (Got: '$HEAD')"
          fi

          # Rule 2: Author must be admin/maintain on this repo
          PERM=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                       -H "Accept: application/vnd.github+json" \
                       "https://api.github.com/repos/$REPO/collaborators/$ACTOR/permission" \
                 | jq -r '.permission')

          if [ "$PERM" != "admin" ] && [ "$PERM" != "maintain" ]; then
            if [ -n "$FAIL_REASON" ]; then
              FAIL_REASON="$FAIL_REASON  "
            fi
            FAIL_REASON="${FAIL_REASON}Only repo admins/maintainers may open PRs to 'production'. (Actor: $ACTOR, perm: $PERM)"
          fi

          if [ -n "$FAIL_REASON" ]; then
            echo "violation=true" >> $GITHUB_OUTPUT
            echo "reason=$FAIL_REASON" >> $GITHUB_OUTPUT
          else
            echo "violation=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment and close PR on violation
        if: steps.check.outputs.violation == 'true'
        run: |
          BODY="This pull request was closed automatically:\n\n- ${{ steps.check.outputs.reason }}\n\nIf you believe this is in error, please contact a repository admin."
          # Comment
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"body\":\"${BODY}\"}" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" >/dev/null
          # Close PR
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{"state":"closed"}' \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" >/dev/null

      - name: Fail the check to block merge
        if: steps.check.outputs.violation == 'true'
        run: |
          echo "Blocking merge due to policy violation: ${{ steps.check.outputs.reason }}"
          exit 1
