# .github/workflows/prod-gate.yml
name: Gate PRs Targeting Production

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [production]   # only trigger on PRs whose TARGET is production

jobs:
  validate:
    # Double guard: skip unless the PR base is production
    if: ${{ github.event.pull_request.base.ref == 'production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      ACTOR: ${{ github.actor }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Compute policy violations
        id: check
        run: |
          FAIL_REASON=""

          # Rule 1: only from development
          if [ "$HEAD_REF" != "development" ]; then
            FAIL_REASON="PRs to '$BASE_REF' must come from 'development'. (Got: '$HEAD_REF')"
          fi

          # Rule 2: only repo admin/maintain can open
          PERM=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                       -H "Accept: application/vnd.github+json" \
                       "https://api.github.com/repos/$REPO/collaborators/$ACTOR/permission" \
                 | jq -r '.permission')

          if [ "$PERM" != "admin" ] && [ "$PERM" != "maintain" ]; then
            if [ -n "$FAIL_REASON" ]; then FAIL_REASON="$FAIL_REASON  "; fi
            FAIL_REASON="${FAIL_REASON}Only repo admins/maintainers may open PRs to '$BASE_REF'. (Actor: $ACTOR, perm: $PERM)"
          fi

          if [ -n "$FAIL_REASON" ]; then
            echo "violation=true" >> $GITHUB_OUTPUT
            echo "reason=$FAIL_REASON" >> $GITHUB_OUTPUT
          else
            echo "violation=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment + close PR on violation
        if: steps.check.outputs.violation == 'true'
        run: |
          BODY="This pull request was closed automatically:\n\n- ${{ steps.check.outputs.reason }}\n\nIf you believe this is in error, please contact a repository admin."
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            -d "{\"body\":\"${BODY}\"}" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" >/dev/null
          curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            -d '{"state":"closed"}' \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" >/dev/null

      - name: Fail check to block merge
        if: steps.check.outputs.violation == 'true'
        run: |
          echo "Blocking merge due to policy violation: ${{ steps.check.outputs.reason }}"
          exit 1
